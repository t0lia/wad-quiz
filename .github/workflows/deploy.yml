name: Deploy

on:
  push:
    branches-ignore: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        working-directory: app
        run: npm ci
      - name: Generate machine1
        working-directory: app
        # PyYAML is needed by app/raw2/generate_machine1.py and is not part
        # of every ubuntu-latest runner's default Python install. The
        # generator also self-bootstraps it as a fallback, but preinstalling
        # here keeps the deploy log quieter and saves ~3s of pip churn.
        run: |
          python3 -m pip install --quiet pyyaml==6.0.2
          npm run generate-machine1
      - name: Test machine validation
        working-directory: app
        run: npm test
      - name: Build app
        working-directory: app
        env:
          VITE_BASE: /${{ github.event.repository.name }}/${{ github.ref_name }}/
        run: npm run build
      - name: Generate scenario diagram
        working-directory: app
        run: npm run generate-diagram
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: app/dist
          destination_dir: ${{ github.ref_name }}
          keep_files: true
