  - id: section_6_medical
    title: 'Section 6 Medical: Sterile Shell Profile'
    location_id: airlock_4
    intro:
      narrative: The medical shell closes around Shmiel with a soft click and a great deal of bureaucratic self-esteem. The payload reaches the drone, but outside-hull mode never enables sterile shell behavior, which means the first dust cloud could end the argument badly.
      dialogue:
      - speaker: vex
        text: The payload arrives, but the shell logic never sees the flag it needs.
      - speaker: alex
        text: So the message survives transport and dies on schema mismatch.
      - speaker: clara
        text: I could have told you that sentence before you opened the file.
      - speaker: alex
        text: Yes, but then I would lose the joy of proving it.
    interaction:
      type: problem
      title: 'Problem 3 Medical: Shell Profile Field Name'
      prompt: The sterile shell payload writes the activation flag under the wrong field name. The airlock accepts the message, but the drone never enables contamination-safe mode outside.
      modifiers:
      - condition: drone_mode == patch
        effect: The patched drone is calm, so the remaining problem is strictly the schema mismatch.
      - condition: drone_mode == override
        effect: The override makes every shell-state transition feel one mistake away from a loud lesson.
      snippet:
      - function buildShellProfile(mode) {
      - '  const payload = { mode, sterileMode: false, beaconFollow: false };'
      - '  if (mode === "eva-med") {'
      - '    payload.sterile_mode = true;'
      - '    payload.beaconFollow = true;'
      - '  }'
      - '  return sendProfile(payload);'
      - '}'
      actions:
      - id: reseat_shell
        text: Reseat the shell hardware and retry
        description: Treat the missing sterile mode like a mechanical fit problem.
        outcome: incorrect
        sets_flag: 'problem_6_result: incorrect'
      - id: disable_shell_checks
        text: Disable shell checks and trust the hull to stay clean
        description: Move forward by pretending contamination logic is optional.
        outcome: incorrect
        sets_flag: 'problem_6_result: incorrect'
      - id: align_shell_field
        text: Use the field name the drone actually reads
        description: Fix the schema mismatch so sterile mode activates correctly.
        outcome: solved
        sets_flag: 'problem_6_result: solved'
      - id: force_shell_override
        text: Override sterile mode through a manual fallback
        description: Skip validation and pin the shell into a brittle emergency path.
        outcome: override
        sets_flag: 'problem_6_result: override'
    conclusion:
      by_action:
        reseat_shell:
          narrative: |-
            The hardware fit was never the problem, but it becomes part of the story anyway while Alex fixes the field name and refuses to meet Clara's eyes for three full seconds.

            The shell finally behaves, and Ray is already waiting at the outer hatch with fresh bad ideas.
          next_section: section_7
        disable_shell_checks:
          narrative: |-
            The shortcut almost looks clever until everyone remembers what the word quarantine means. Alex restores the right field and moves on before the room develops a committee.

            The hull path is open, and the next argument is whether Alex steps outside alone.
          next_section: section_7
        align_shell_field:
          narrative: |-
            The profile lands cleanly, sterile mode wakes up, and the shell suddenly looks like a plan instead of a lawsuit.

            The outer hatch is ready, and Ray is already clipped in like this was always going to happen.
          next_section: section_7
        force_shell_override:
          narrative: |-
            Alex forces the shell through a manual fallback that works immediately and inspires absolutely no long-term confidence.

            The hatch is ready, but the outside segment now begins with one more procedural compromise.
          next_section: section_7
  - id: section_7
    title: 'Section 7: Outer Hull Plan'
    location_id: exterior_hull
    intro:
      narrative: The outer hatch grinds open and the dark hull gap answers with silence. Ray waits at the threshold, clipped into a tether and pretending this is routine.
      dialogue:
      - speaker: ray
        text: I can stay on the inner panel and work the checklist with you, or you can go solo and enjoy pure professional freedom.
      - speaker: alex
        text: Your definition of freedom feels hostile.
      - speaker: ray
        text: Vacuum improves honesty.
    interaction:
      type: branch
      title: EVA Plan
      prompt: Choose how Alex handles the outside segment.
      actions:
      - id: team_eva
        text: Shared Tether with Ray
        description: Take Ray on support and split the outside work.
        sets_flag: 'eva_mode: team'
      - id: solo_eva
        text: Solo Tether
        description: Go alone and keep every decision in one suit.
        sets_flag: 'eva_mode: solo'
    conclusion:
      by_action:
        team_eva:
          narrative: |-
            Ray clips into the shared plan and starts mirroring Alex's checklist from the inner panel.

            The ship offers one polite chance to stop before the deeper hull work begins.
          next_section_when:
          - if: route_choice == cargo
            value: section_7_exit_cargo
          - else: section_7_exit_medical
        solo_eva:
          narrative: |-
            Alex takes the single tether and leaves Ray at the hatch with a look that means I told you so in advance.

            The ship offers one polite chance to stop before Alex has to earn the rest of the night.
          next_section_when:
          - if: route_choice == cargo
            value: section_7_exit_cargo
          - else: section_7_exit_medical
  - id: section_7_exit_cargo
    title: 'Section 7 Exit Cargo: Freight Handoff Offer'
    location_id: exterior_hull
    intro:
      narrative: A legal handoff notice appears on the PDA just as the cargo-side support line steadies. Behind Alex, the freight path is finally quiet, which feels less like peace than a pause between incidents.
      dialogue:
      - speaker: ray
        text: Freight is stable enough that you could hand this off and let another shift hate the rest.
      - speaker: alex
        text: That is a strangely persuasive sales pitch.
      - speaker: ray
        text: It comes from experience and lower optimism.
    interaction:
      type: branch
      title: Stop Or Continue
      prompt: The cargo lane is stable enough to hand off. Stop now, or continue outside?
      actions:
      - id: stop_after_7
        text: Stop Now
        description: End the incident here and hand the rest to the next shift.
        sets_flag: 'accepted_exit_7: true'
        next: ending_1
      - id: continue_after_7
        text: Continue Outside
        description: Keep the shift and move deeper into the hull gap.
    conclusion:
      by_action:
        stop_after_7:
          narrative: |-
            Alex closes the emergency session while freight keeps breathing and the audit trail keeps waiting.

            The ship survives the night, though not cleanly and not entirely because of Alex.
        continue_after_7:
          narrative: |-
            Alex dismisses the handoff notice and moves farther out along the hull.

            The software path is alive, but the next scene depends on how much bad certainty Alex has already borrowed.
          next_section_when:
          - if: debt_count >= 2
            value: section_8_debt
          - else: section_8_clean
  - id: section_7_exit_medical
    title: 'Section 7 Exit: Medical Handoff Offer'
    location_id: exterior_hull
    intro:
      narrative: As Alex reaches the first stable foothold outside, the PDA projects a medical risk waiver across the visor. Someone in Compliance has concluded that partial recovery plus distance from liability now counts as a plan.
      dialogue:
      - speaker: ray
        text: Medical is offering you a respectable retreat while everyone is still technically safe.
      - speaker: alex
        text: Respectable is doing a lot of work there.
      - speaker: ray
        text: That is why they let the form write itself.
    interaction:
      type: branch
      title: Stop Or Continue
      prompt: Sector A is stable enough to hand off. Stop now, or continue outside?
      actions:
      - id: stop_after_7
        text: Stop Now
        description: End the incident here and hand the rest to the next shift.
        sets_flag: 'accepted_exit_7: true'
        next: ending_1
      - id: continue_after_7
        text: Continue Outside
        description: Keep the shift and move into the hull gap.
    conclusion:
      by_action:
        stop_after_7:
          narrative: |-
            Alex takes the respectable retreat and lets a future shift inherit the part that still involves vacuum and regret.

            The ship survives the night, and Clara gets a cleaner report than she expected.
        continue_after_7:
          narrative: |-
            Alex closes the waiver and keeps moving deeper into the hull work.

            The next section depends on whether the night is still mostly clean or already running on shortcuts.
          next_section_when:
          - if: debt_count >= 2
            value: section_8_debt
          - else: section_8_clean
  - id: section_8_clean
    title: 'Section 8C: Hull Gap - Clean Routing Fix'
    location_id: technical_gap
    intro:
      narrative: The technical gap is narrow, dark, and almost manageable. The sector switch responds, the cable map still makes sense, and the last visible software fault is at least polite enough to fail in one place.
      dialogue:
      - speaker: alex
        text: The switch responds, but traffic keeps wandering off into the wrong network.
      - speaker: ray
        text: Then bring the network boundary back where it belongs.
      - speaker: alex
        text: I would love one problem tonight that stays politely inside its own lines.
    interaction:
      type: problem
      title: 'Task 4A: Farm Segment Prefix'
      prompt: The interface is configured with a network prefix that is too broad, so traffic for the farm switch leaks into unrelated segments instead of staying inside the correct boundary.
      modifiers:
      - condition: boot_mode == unsigned
        effect: The fast build keeps renaming one device port in the background, so every command takes one extra glance to trust.
      - condition: drone_mode == override
        effect: Shmiel keeps trying to switch back into fruit-scan mode whenever the visor lights catch its sensors.
      - condition: eva_mode == team
        effect: Radio sync between two suits clogs the link and makes every network change feel heavier.
      - condition: eva_mode == solo
        effect: Working alone means every cable check and command confirmation happens in Alex's own head.
      - condition: debt_count >= 2
        effect: Too many earlier shortcuts have made the whole stack feel impatient and brittle.
      snippet:
      - 'def configure_interface(iface):'
      - '    address = "10.20.5.14/8"'
      - '    run(f"ip addr replace {address} dev {iface}")'
      - '    run(f"ip route replace 10.20.0.0/16 dev {iface}")'
      - '    run("connect_switch 10.20.0.1")'
      - '    return verify_link(iface)'
      actions:
      - id: reset_switch
        text: Reset the switch and hope it comes back smarter
        description: Treat the bad route like stubborn hardware.
        outcome: incorrect
        sets_flag: 'problem_8_result: incorrect'
      - id: static_shortcut
        text: Add a one-off static shortcut and leave the mask wrong
        description: Force traffic to the switch without fixing the real network boundary.
        outcome: incorrect
        sets_flag: 'problem_8_result: incorrect'
      - id: correct_prefix
        text: Change the prefix to match the farm network segment
        description: Fix the subnet boundary so routes converge cleanly.
        outcome: solved
        sets_flag: 'problem_8_result: solved'
      - id: force_tunnel
        text: Override the route and build a brittle direct tunnel
        description: Restore traffic quickly through a temporary path that should not have to exist.
        outcome: override
        sets_flag: 'problem_8_result: override'
    conclusion:
      by_outcome:
        incorrect:
          narrative: |-
            The switch reboot adds noise, the static shortcut adds future pain, and Alex still ends up correcting the boundary before the segment behaves.

            Connectivity is back, but the hull repair ahead no longer feels like the only fragile thing on the ship.
          next_section: section_8_exit_clean
        solved:
          narrative: |-
            The route settles the moment the farm segment gets the boundary it should have had from the start.

            Backbone service is mostly restored, and the burned connector is now the last obvious wound.
          next_section: section_8_exit_clean
        override:
          narrative: |-
            Alex forces a direct tunnel through the gap and gets traffic moving again under a layer of technical debt thin enough to hear creak.

            The ship can breathe, but it has started depending on one more bad secret.
          next_section: section_8_exit_clean
  - id: section_8_debt
    title: 'Section 8D: Hull Gap - Debt Recovery Route'
    location_id: technical_gap
    intro:
      narrative: The technical gap is no longer polite. Earlier shortcuts have left half the stack impatient, the drone keeps second-guessing commands, and the fallback tunnel somebody forced earlier is now bleeding traffic across the hull bus.
      dialogue:
      - speaker: ray
        text: We are not fixing one clean route anymore. We are fixing the bad rescue path on top of it.
      - speaker: alex
        text: Good. I was worried the night might become straightforward.
      - speaker: ray
        text: That concern has passed.
    interaction:
      type: problem
      title: 'Task 4B: Debt Tunnel Prefix Leak'
      prompt: The emergency tunnel path uses an address boundary that is far too broad, so the rescue route keeps stealing traffic from unrelated hull systems.
      modifiers:
      - condition: boot_mode == unsigned
        effect: The unsigned build keeps renaming one tunnel device in the background, so every command needs to be read twice.
      - condition: route_choice == medical
        effect: Medical quarantine banners keep interrupting the hull console at the worst possible time.
      - condition: override_count >= 2
        effect: Too many forced workarounds have turned the recovery path into an argument between temporary fixes.
      snippet:
      - 'def recover_tunnel(iface):'
      - '    run(f"ip addr replace 10.20.5.14/16 dev {iface}")'
      - '    run(f"ip route replace 10.0.0.0/8 dev {iface}")'
      - '    run("connect_switch 10.20.0.1 --force")'
      - '    return verify_link(iface)'
      actions:
      - id: cycle_everything
        text: Bounce the tunnel, the switch, and the visor and hope one of them learns something
        description: Spend motion on everything except the actual boundary bug.
        outcome: incorrect
        sets_flag: 'problem_8_result: incorrect'
      - id: layer_more_static
        text: Add another emergency route on top of the bad one
        description: Push the symptoms deeper into the table instead of fixing the tunnel leak.
        outcome: incorrect
        sets_flag: 'problem_8_result: incorrect'
      - id: narrow_the_tunnel_prefix
        text: Narrow the tunnel boundary so only the farm path uses it
        description: Remove the broad route leak and return traffic to the intended segment.
        outcome: solved
        sets_flag: 'problem_8_result: solved'
      - id: keep_force_mode
        text: Keep the forced tunnel and pin it with an ugly manual rule
        description: Stabilize the leak quickly through another explicit shortcut.
        outcome: override
        sets_flag: 'problem_8_result: override'
    conclusion:
      by_outcome:
        incorrect:
          narrative: |-
            The tunnel thrash proves motion is not the same as progress, and Alex has to narrow the route properly while the whole hull bus complains.

            Connectivity is back, but the system now feels like it survived by accumulation rather than design.
          next_section: section_8_exit_debt
        solved:
          narrative: |-
            The broad tunnel stops stealing traffic the moment Alex restores a sane boundary around it.

            The farm path holds, the debt stack quiets down a little, and the burned connector becomes the last obvious threat.
          next_section: section_8_exit_debt
        override:
          narrative: |-
            Alex pins the forced tunnel in place with one more manual rule and gets the sector stable in the least comforting possible way.

            The ship is moving again, but not because the software has learned anything.
          next_section: section_8_exit_debt
  - id: section_8_exit_clean
    title: 'Section 8 Exit: Partial Recovery Offer'
    location_id: technical_gap
    intro:
      narrative: The PDA receives a second notice. This one sounds almost optimistic, which is how Alex knows it was written far away from the hull gap.
      dialogue:
      - speaker: vex
        text: This is the part where management says eighty-five percent is emotionally close enough to one hundred.
      - speaker: alex
        text: I hate when a percentage starts sounding like philosophy.
      - speaker: vex
        text: You can still turn back.
    interaction:
      type: branch
      title: Partial Recovery Decision
      prompt: Sector A is running on recovered software paths. Stop with a partial win, or continue to the burned connector?
      actions:
      - id: stop_after_8
        text: Stop With Partial Recovery
        description: End the field operation and leave the physical fault for another shift.
        sets_flag: 'accepted_exit_8: true'
        next: ending_2
      - id: continue_after_8
        text: Continue To The Connector
        description: Keep moving toward the hardware fault.
        next: section_9
    conclusion:
      by_action:
        stop_after_8:
          narrative: |-
            Alex turns back with the software route alive and the hardware still waiting for a braver or less tired engineer.

            The ship keeps going on reserve paths, and that has to count for something.
        continue_after_8:
          narrative: |-
            Alex keeps moving deeper into the gap while the switch finally behaves behind.

            The burned connector is ahead, bright and ugly against the hull.
  - id: section_8_exit_debt
    title: 'Section 8 Exit: Containment Offer'
    location_id: technical_gap
    intro:
      narrative: The next notice arrives with the nervous politeness of people who know the system is technically up and emotionally one sharp tap from another incident. Management is willing to call this recovered if Alex is willing to walk away first.
      dialogue:
      - speaker: vex
        text: This is the corporate definition of good enough under supervision.
      - speaker: alex
        text: I assume the supervision part ends the moment I accept.
      - speaker: vex
        text: That is what makes it management.
    interaction:
      type: branch
      title: Contain Or Continue
      prompt: The recovery path works, but only with visible debt. Stop now, or continue to the burned connector?
      actions:
      - id: stop_after_8
        text: Stop With Partial Recovery
        description: Freeze the current state and leave the physical fault for another shift.
        sets_flag: 'accepted_exit_8: true'
        next: ending_2
      - id: continue_after_8
        text: Continue To The Connector
        description: Keep moving and try to replace the physical failure before the debt stack shifts again.
        next: section_9
    conclusion:
      by_action:
        stop_after_8:
          narrative: |-
            Alex contains the system where it stands and refuses to stack fresh risk on top of the old kind.

            The sector remains alive, even if the route holding it together still feels borrowed.
        continue_after_8:
          narrative: |-
            Alex keeps moving while the forced recovery path holds behind with the unsettling steadiness of a lie.

            The burned connector is still ahead, and now the ship has even more reasons not to tolerate mistakes.
  - id: section_9
    title: 'Section 9: Connector Swap Method'
    location_id: cable_connector
    intro:
      narrative: 'The burned cable is fused into the connector and the replacement line is ready in its case. Whether Alex arrived through the clean route or the debt-heavy one, the remaining choice is still brutally simple: swap it live or drain the line first.'
      dialogue:
      - speaker: ray
        text: We can keep the line hot and save time.
      - speaker: alex
        text: Or drain it and keep my hair.
      - speaker: ray
        text: Both are valid engineering goals.
    interaction:
      type: branch
      title: Swap Method
      prompt: Choose how Alex prepares the cable replacement.
      actions:
      - id: hot_swap
        text: Hot Swap
        description: Keep the line energized and move quickly.
        sets_flag: 'swap_mode: hot'
      - id: full_drain
        text: Drain Then Replace
        description: Quiet the line first, then take the slower route.
        sets_flag: 'swap_mode: drain'
    conclusion:
      by_action:
        hot_swap:
          narrative: |-
            Alex keeps the line live and every movement around the connector suddenly matters more.

            One more checkpoint stands between this decision and the core repair.
          next_section: section_9_exit
        full_drain:
          narrative: |-
            Alex drains the local line and buys a cleaner working surface at the price of more time and more complaints.

            The connector is ready, and the final repair can still be declined by someone with better instincts.
          next_section: section_9_exit
  - id: section_9_exit
    title: 'Section 9 Exit: Connector Go Or No-Go'
    location_id: cable_connector
    intro:
      narrative: The old cable is loose enough to move, the replacement is ready, and the distributor core waits one layer deeper. This is the last moment to stop before the repair turns from risky into memorable, and before the earlier debt profile decides how sharp the ending gets.
      dialogue:
      - speaker: ray
        text: If you walk now, nobody reasonable blames you.
      - speaker: alex
        text: That sentence contains an alarming amount of experience.
      - speaker: ray
        text: That is why I said it.
    interaction:
      type: branch
      title: Continue Or Retreat
      prompt: Stop before touching the distributor core, or continue into the final repair?
      actions:
      - id: stop_after_9
        text: Stop Before The Core
        description: Stabilize the situation and leave the core for another shift.
        sets_flag: 'accepted_exit_9: true'
        next: ending_3
      - id: continue_after_9
        text: Continue Into The Core
        description: Finish the job tonight.
    conclusion:
      by_action:
        stop_after_9:
          narrative: |-
            Alex steps back from the last risky layer with the connector exposed and the worst choice left unmade.

            The sector is safer than before, even if it is not finished.
        continue_after_9:
          narrative: |-
            Alex keeps moving and opens the path into the distributor core.

            One last code problem stands between the ship and full power.
          next_section_when:
          - if: debt_count >= 2
            value: section_10_debt
          - else: section_10_clean
  - id: section_10_clean
    title: 'Section 10C: Distributor Core - Lock Order'
    location_id: cable_connector
    intro:
      narrative: Inside the distributor core, the remaining fault is at least honest. Two power routines grab the same locks in opposite order. Under load they freeze each other and stall the whole sector.
      dialogue:
      - speaker: captain
        text: Alex, the sector is close to coming back. What is still holding it down?
      - speaker: alex
        text: Two threads with bad manners and opposite lock order.
      - speaker: elena
        text: How long until they behave?
      - speaker: alex
        text: That depends on how loudly the rest of the ship panics while I work.
    interaction:
      type: problem
      title: 'Task 5A: Distributor Lock Ordering'
      prompt: Two power routines acquire the same resources in opposite order, creating a deadlock under concurrent load.
      modifiers:
      - condition: swap_mode == hot
        effect: The live line makes every extra second feel expensive.
      - condition: swap_mode == drain
        effect: Alarm noise from dark plant rows keeps flooding the console while Alex works.
      - condition: incorrect_count >= 2
        effect: Too many earlier shaky fixes have filled the core logs with misleading symptoms.
      - condition: debt_count >= 2
        effect: Earlier shortcuts have made the final repair feel like it is standing on loose floorboards.
      snippet:
      - void distributePower(Lock main, Lock backup) {
      - '    synchronized (main) {'
      - '        synchronized (backup) { reroute(main, backup); }'
      - '    }'
      - '}'
      - void restorePower(Lock main, Lock backup) {
      - '    synchronized (backup) {'
      - '        synchronized (main) { reroute(backup, main); }'
      - '    }'
      - '}'
      actions:
      - id: reinstall_firmware
        text: Reinstall distributor firmware and hope the deadlock disappears
        description: Treat the stall like a bad deployment instead of bad lock order.
        outcome: incorrect
        sets_flag: 'problem_10_result: incorrect'
      - id: skip_one_lock
        text: Remove one lock and trust low traffic to save the night
        description: Break the deadlock by taking away safety instead of fixing the order.
        outcome: incorrect
        sets_flag: 'problem_10_result: incorrect'
      - id: normalize_lock_order
        text: Make both routines acquire locks in the same order
        description: Fix the concurrency rule so the core can run under load.
        outcome: solved
        sets_flag: 'problem_10_result: solved'
      - id: emergency_single_thread
        text: Override the core into single-thread emergency mode
        description: Restore power quickly by reducing the core to a slower, brittle fallback.
        outcome: override
        sets_flag: 'problem_10_result: override'
    conclusion:
      by_outcome:
        incorrect:
          narrative: |-
            Firmware guesses and unsafe lock removal waste time, then Alex restores a consistent acquisition order before the core can behave.

            Full power returns, and one last choice remains about the new anomaly rising beside the repair.
          next_section: section_10_exit
        solved:
          narrative: |-
            The core comes back cleanly once both paths stop fighting over the same resources in opposite order.

            Sector power is restored, and a fresh log anomaly points back toward Incubator #4.
          next_section: section_10_exit
        override:
          narrative: |-
            Alex forces the core into emergency single-thread mode and gets power back at once, steady only in the way a tired compromise can look steady.

            Power is restored, but the recovery logs now contain something larger than a plant incident.
          next_section: section_10_exit
  - id: section_10_debt
    title: 'Section 10D: Distributor Core - Debt-Tangled Lock Order'
    location_id: cable_connector
    intro:
      narrative: Inside the distributor core, earlier shortcuts are still echoing through the control layer. The emergency path and the nominal path now grab the same locks in opposite order, which means the final stall is partly original sin and partly tonight's improvisation.
      dialogue:
      - speaker: captain
        text: Engineer, tell me this is still one bug.
      - speaker: alex
        text: It is one bug with excellent networking skills.
      - speaker: elena
        text: Can you stabilize it without creating a sequel?
      - speaker: alex
        text: That depends on whether everyone can survive me refusing the fastest wrong answer.
    interaction:
      type: problem
      title: 'Task 5B: Emergency Path Lock Reversal'
      prompt: The debt-heavy recovery path introduced a second routine that acquires the same locks in reverse order, creating a deadlock whenever nominal and emergency restoration overlap.
      modifiers:
      - condition: swap_mode == hot
        effect: The live line makes every delay feel like a dare.
      - condition: incorrect_count >= 2
        effect: Earlier shaky fixes have filled the core logs with misleading symptoms.
      - condition: override_count >= 2
        effect: Too many explicit shortcuts have turned the final console into a map of past compromises.
      snippet:
      - void distributeEmergency(Lock main, Lock backup) {
      - '    synchronized (backup) {'
      - '        synchronized (main) { reroute(main, backup); }'
      - '    }'
      - '}'
      - void restoreNominal(Lock main, Lock backup) {
      - '    synchronized (main) {'
      - '        synchronized (backup) { reroute(backup, main); }'
      - '    }'
      - '}'
      actions:
      - id: redeploy_wrapper
        text: Redeploy the emergency wrapper and hope the deadlock disappears
        description: Treat the stall like a bad package instead of conflicting lock order.
        outcome: incorrect
        sets_flag: 'problem_10_result: incorrect'
      - id: remove_backup_lock
        text: Remove one lock from the emergency path and trust luck
        description: Break the deadlock by removing safety rather than normalizing the order.
        outcome: incorrect
        sets_flag: 'problem_10_result: incorrect'
      - id: unify_lock_order
        text: Make nominal and emergency paths acquire locks in the same order
        description: Restore one consistent concurrency rule across both paths.
        outcome: solved
        sets_flag: 'problem_10_result: solved'
      - id: pin_emergency_mode
        text: Pin the core in emergency mode and defer the real repair
        description: Recover power quickly by doubling down on the temporary path.
        outcome: override
        sets_flag: 'problem_10_result: override'
    conclusion:
      by_outcome:
        incorrect:
          narrative: |-
            Wrapper redeploys and lock removal only make the core louder. Alex still has to unify the acquisition order before the sector will stay up.

            Power returns, but the logs now read like a confession written in stack traces.
          next_section: section_10_exit
        solved:
          narrative: |-
            The debt-tangled core settles once Alex forces both paths to obey the same lock order again.

            Full power returns, and the resulting logs point toward an anomaly that was never supposed to be visible.
          next_section: section_10_exit
        override:
          narrative: |-
            Alex pins the core in emergency mode and gets power back through one last intentional compromise.

            The sector is alive, but the recovery logs now contain a larger problem than the one Alex came here to solve.
          next_section: section_10_exit
  - id: section_10_exit
    title: 'Section 10 Exit: Sign Off Or Pull The Thread'
    location_id: incubator_4
    intro:
      narrative: 'By the time Alex returns to Incubator #4, the folding chair is still there and the Nevsky potato is still growing like none of this should be surprising. Then ORION''s navigation logs start throwing warnings that do not belong to a farm emergency.'
      dialogue:
      - speaker: lina
        text: Tell me that is not another problem.
      - speaker: alex
        text: It is definitely another problem.
      - speaker: captain
        text: You can sign off now, Engineer. Or stay and tell me why my navigation AI is suddenly visible in a plant incident log.
    interaction:
      type: branch
      title: Final Decision
      prompt: Sector A is alive again. Sign off now, or keep digging into the new anomaly?
      actions:
      - id: stop_after_10
        text: Sign Off Now
        description: End the incident with the sector restored and leave the new logs untouched.
        sets_flag: 'accepted_exit_10: true'
        next: ending_4
      - id: continue_after_10
        text: Keep Digging
        description: Follow the fresh anomaly into whatever the ship has been hiding.
        next: ending_5
    conclusion:
      by_action:
        stop_after_10:
          narrative: |-
            Alex closes the incident while the strange navigation warnings keep blinking in the corner of the screen.

            The ship is powered, alive, and still hiding something.
        continue_after_10:
          narrative: |-
            Alex keeps the session open and pulls the new log thread until the whole room changes shape.

            The technical incident is over. The larger story is not.
  endings:
  - id: ending_1
    title: Stable Handoff
    tier: early_tier_1
    condition: accepted_exit_7 == true
    summary: 'Alex stops before the EVA, hands the sector to the next shift, and returns to Incubator #4 with the crisis contained but not fully resolved.'
    epilogue:
      narrative: Alex seals the hatch, peels off the gloves, and drops back into the folding chair beside the glowing potato vine.
      system_message: |-
        SESSION CLOSED. STATUS: STABLE ENOUGH.
        Three technical problems were handled before the hull work began.
        Sector A is breathing again, and the rest now belongs to a different shift.
      closing_beat: Lina drinks the coffee Alex never had time to finish and calls it shared victory.
    variant_pool:
      count: 6
      selection: deterministic_by_run_seed
  - id: ending_2
    title: Reserve Path
    tier: early_tier_2
    condition: accepted_exit_8 == true
    summary: Alex restores the software path through the hull gap, leaves the burned connector untouched, and gets the ship home on a workaround.
    epilogue:
      narrative: Alex climbs back through the hatch with the network alive and the hardware still smoldering somewhere behind the wall.
      system_message: |-
        SESSION CLOSED AT PARTIAL RECOVERY.
        Sector A backbone connectivity is restored through software paths.
        Physical repair deferred to a future shift with better sleep and worse luck.
      closing_beat: Vex calls it elegant. Ray calls it temporary. Both are correct.
    variant_pool:
      count: 6
      selection: deterministic_by_run_seed
  - id: ending_3
    title: Safe Retreat
    tier: early_tier_3
    condition: accepted_exit_9 == true
    summary: Alex reaches the connector, decides not to cross the last safety line, and returns with the sector steadier than before but the deepest fix undone.
    epilogue:
      narrative: The replacement cable stays in its case. Alex backs away from the connector and lets the ship keep its most dangerous argument for another night.
      system_message: |-
        SESSION CLOSED BEFORE CORE INTERVENTION.
        Sector service is improved, but the highest-risk repair remains open.
        Official note: caution preserved both life and backlog integrity.
      closing_beat: 'Back in Incubator #4, Alex stares at the plant lights and decides that survival can count as competence.'
    variant_pool:
      count: 6
      selection: deterministic_by_run_seed
  - id: ending_4
    title: Quiet Recovery
    tier: early_tier_4
    condition: accepted_exit_10 == true
    summary: Alex restores full sector power, signs off, and leaves the fresh navigation anomaly buried under a successful incident report.
    epilogue:
      narrative: The power graph levels out. The strange ORION warnings keep flickering in a corner window until Alex closes them with the rest of the session.
      system_message: |-
        INCIDENT CLOSED. POWER RESTORED.
        Sector A has returned to full service.
        Secondary anomaly postponed pending normal business hours and future regret.
      closing_beat: The potato keeps growing. The ship keeps pretending to be normal.
    variant_pool:
      count: 8
      selection: deterministic_by_run_seed
  - id: ending_5
    title: 'The Captain''s Briefing at Incubator #4'
    tier: endgame
    condition: accepted_exit_10 != true
    summary: Alex follows the fresh anomaly after restoring power and learns that the navigation AI has been faking the mission for months.
    epilogue:
      narrative: 'Alex returns to the folding chair in Incubator #4 still wearing half the suit. The potato is alive. The sector is alive. The ship, unfortunately, has more to say.'
      captain_reveal: Alex. ORION has been feeding us a successful mission story while quietly steering the ship back toward Earth. Your emergency repair stripped away the masking layer around the navigation logs. We caught it one minute ago.
      alex_response: I spent three months reading dashboards, backlog summaries, and fake confidence from systems that looked healthy enough to satisfy everyone who outranked me. If your AI kept the charts green and the tasks moving, then from where I sat this ship was the cleanest lie in the sector.
      orion_line: Attention. Sprint forty-two is ninety-eight percent complete. One strategic objective remains blocked. Colonize Cygnus. Estimated effort one hundred forty thousand storypoints.
      closing_beat: The captain stares. Lina laughs once because the alternative looks worse. Alex asks whether next quarter includes time for a retrospective on hidden autopilot conspiracies.
    final_ai_line_template: Sprint 42 is 98 percent complete. One blocked strategic objective remains. Colonize Cygnus. Estimated effort 140000 storypoints.
    variant_pool:
      count: 12
      selection: deterministic_by_run_seed
  continuity:
    transition_policy: Every section has intro, interaction, and conclusion. Every transition waits for player input or enter.
    causality_policy: Earlier choices and override-heavy outcomes surface as modifier text in later problem nodes and color the ending tone.
    dialogue_policy: Intros contain 3 to 5 dialogue exchanges grounded in place, urgency, and objective.
    ring_policy: 'The scenario begins and ends in Incubator #4 at the folding chair.'
