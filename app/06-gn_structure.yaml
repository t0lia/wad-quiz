  - id: section_6_cargo
    title: 'Section 6 Cargo: Clamp Follow Profile'
    location_id: airlock_4
    intro:
      narrative: The cargo-side hull kit locks into Shmiel's frame with a metallic snap. The drone accepts the follow profile, then immediately treats magnetic clamp mode like a suggestion instead of a command.
      dialogue:
      - speaker: vex
        text: The payload loads, but the clamp logic wakes up outside and forgets what boolean fields are for.
      - speaker: alex
        text: So transport accepts the shape, behavior rejects the meaning.
      - speaker: vex
        text: Exactly. Give me boring data and I will give you a drone that survives vacuum.
    interaction:
      type: problem
      title: 'Problem 3 Cargo: Clamp Mode Typing'
      prompt: The cargo hull profile sets the magnetic clamp field with the wrong type. The drone accepts the payload, but outside it treats clamp mode as disabled.
      modifiers:
      - condition: drone_mode == patch
        effect: The patched drone stays calm, so the problem is mostly data integrity.
      - condition: drone_mode == override
        effect: The hard override already made Shmiel twitchy, so any bad payload now looks more dramatic.
      snippet:
      - function buildClampProfile(mode) {
      - '  const profile = { mode, magClamp: false, tetherFollow: false };'
      - '  if (mode === "hull") {'
      - '    profile.magClamp = "true";'
      - '    profile.tetherFollow = true;'
      - '  }'
      - '  return deployProfile(profile);'
      - '}'
      actions:
      - id: replace_battery
        text: Replace the drone battery pack
        description: Treat the clamp failure like a power problem.
        outcome: incorrect
        sets_flag: 'problem_6_result: incorrect'
      - id: static_distance
        text: Hardcode a fixed standoff distance and ignore clamp state
        description: Make the drone trail roughly behind without fixing the actual mode flag.
        outcome: incorrect
        sets_flag: 'problem_6_result: incorrect'
      - id: boolean_follow
        text: Send magClamp as a real boolean value
        description: Fix the payload so clamp logic activates correctly outside.
        outcome: solved
        sets_flag: 'problem_6_result: solved'
      - id: manual_follow_override
        text: Override the profile and force manual clamp behavior
        description: Skip validation and pin the drone to a dirtier fallback mode.
        outcome: override
        sets_flag: 'problem_6_result: override'
    conclusion:
      by_action:
        replace_battery:
          narrative: |-
            The fresh battery does nothing for the bad payload, but Alex fixes the field under fresh embarrassment and gets the hatch cycle moving again.

            The drone now behaves well enough to open the outer hatch, and Ray is waiting with the next questionable offer.
          next_section: section_7
        static_distance:
          narrative: |-
            The offset hack works right up to the first test drift, where it becomes an argument with physics. Alex corrects the field and keeps the worst part of the experiment to himself.

            Hull movement is possible now, and the only remaining question is whether Alex takes Ray along.
          next_section: section_7
        boolean_follow:
          narrative: |-
            The profile lands cleanly, the clamp field behaves, and Shmiel suddenly looks much more employable.

            The outer hatch is ready, and Ray is already waiting with a new definition of teamwork.
          next_section: section_7
        manual_follow_override:
          narrative: |-
            Alex forces the drone into a manual clamp path that works immediately and looks deeply temporary.

            The hatch is ready, but the outside segment now begins with one more borrowed certainty.
          next_section: section_7
  - id: section_4_medical
    title: 'Section 4 Medical: Quarantine Side Gate'
    location_id: access_gate
    intro:
      narrative: Clara leads Alex through the medical corridor to a quarantine side gate with cleaner walls and angrier software. The gate sees the emergency waiver, the maintenance role, and Clara's approval. It still declares the record incomplete and keeps the lock engaged.
      dialogue:
      - speaker: clara
        text: The waiver exists. I signed it myself.
      - speaker: alex
        text: Then the gate is either afraid of doctors or confused by field names.
      - speaker: clara
        text: I can work with either diagnosis.
      - speaker: alex
        text: Let us start with the one that compiles.
    interaction:
      type: problem
      title: 'Problem 2 Medical: Waiver Field Mismatch'
      prompt: The quarantine gate builds a clearance payload, but writes the approval flag to the wrong field name. Clara's valid medical waiver never reaches the logic that unlocks the door.
      modifiers:
      - condition: boot_mode == unsigned
        effect: The unsigned build keeps collapsing warning panels, which makes the gate logs feel even less honest.
      snippet:
      - 'def build_clearance(record):'
      - '    payload = {"level": record["level"], "waiverApproved": False}'
      - '    if record["doctor_ok"]:'
      - '        payload["waiver_approved"] = True'
      - '    return payload'
      actions:
      - id: rescan_wristband
        text: Rescan Clara's wristband until the panel gives up
        description: Treat the failure as a bad badge read.
        outcome: incorrect
        sets_flag: 'problem_4_result: incorrect'
      - id: skip_quarantine_check
        text: Bypass the quarantine check entirely
        description: Open the door by flattening a medical safety rule.
        outcome: incorrect
        sets_flag: 'problem_4_result: incorrect'
      - id: align_waiver_field
        text: Write the approval flag to the field the gate actually reads
        description: Fix the schema mismatch so the medical waiver is recognized.
        outcome: solved
        sets_flag: 'problem_4_result: solved'
      - id: force_manual_release
        text: Trigger a manual release and leave the paperwork behind
        description: Open the gate physically and trust the incident report to sound noble later.
        outcome: override
        sets_flag: 'problem_4_result: override'
    conclusion:
      by_action:
        rescan_wristband:
          narrative: |-
            The scanner accepts Clara perfectly every single time and remains wrong with perfect confidence. Alex fixes the field mismatch while Clara develops new opinions about software teams.

            The quarantine lane opens, but only after the medical side learns exactly how avoidable this was.
          next_section: section_5_medical_fallout
        skip_quarantine_check:
          narrative: |-
            The bypass opens the door and quietly insults every isolation protocol on the ship. Clara promises to forget the patch if Alex promises never to write it again.

            The path is clear, but the logs now contain a sentence nobody should have to explain to an ethics committee.
          next_section: section_5_medical_fallout
        align_waiver_field:
          narrative: |-
            The gate unlocks the moment the approval flag lands in the field it was always supposed to read. Clara gives the panel a look usually reserved for contagious stupidity.

            The decontamination corridor clears cleanly toward Airlock
          next_section: section_5_medical
        force_manual_release:
          narrative: |-
            Alex trips the manual release, the seal cycles open, and quarantine policy becomes an abstract concept for thirty uncomfortable seconds.

            The route is open, but medical now owes itself a serious internal conversation.
          next_section: section_5_medical_fallout
