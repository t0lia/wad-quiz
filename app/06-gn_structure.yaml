format: SectionStoryGraphV2
version: 2.0
language: en
session:
  mode: realtime
  duration_minutes: 15
  structure: branching_slots
  target_structure: branching_slots
  main_node_sequence:
  - choice
  - problem
  - choice
  - problem
  - choice
  - problem
  - choice
  - problem
  - choice
  - problem
  post_node_exit_sections:
  - after_node: section_7
    section_id: section_7_exit_cargo
  - after_node: section_7
    section_id: section_7_exit_medical
  - after_node: section_8_clean
    section_id: section_8_exit_clean
  - after_node: section_8_debt
    section_id: section_8_exit_debt
  - after_node: section_9
    section_id: section_9_exit
  - after_node: section_10_clean
    section_id: section_10_exit
  - after_node: section_10_debt
    section_id: section_10_exit
rules:
  main_node_count: 10
  early_exit_section_count: 4
  note: Hydroworld now uses a branching slot structure. Sections 1-2 stay shared, sections 3-10 split by route and debt, and the surviving paths merge only for the ORION reveal gate.
  interaction_patterns:
  - branch
  - problem
  - branch
  - problem
  - branch
  - problem
  - branch
  - branch
  - problem
  - branch
  - branch
  - branch
  - problem
  - branch
  problem_node_structure:
    options_per_problem: 4
    required_outcomes:
    - solved
    - incorrect
    - override
  narrative_requirements:
  - every section must contain an intro, an interaction, and a conclusion
  - every intro must contain at least one dialogue exchange
  - every conclusion must prepare the next section or the ending
  - every transition between parts must wait for player input or enter
state_model:
  flags:
    boot_mode: enum[standard, unsigned]
    route_choice: enum[cargo, medical]
    drone_mode: enum[patch, override]
    eva_mode: enum[team, solo]
    swap_mode: enum[hot, drain]
    accepted_exit_7: boolean
    accepted_exit_8: boolean
    accepted_exit_9: boolean
    accepted_exit_10: boolean
    problem_2_result: enum[solved, incorrect, override]
    problem_4_result: enum[solved, incorrect, override]
    problem_6_result: enum[solved, incorrect, override]
    problem_8_result: enum[solved, incorrect, override]
    problem_10_result: enum[solved, incorrect, override]
  derived:
    debt_count:
      from:
      - boot_mode
      - drone_mode
      - eva_mode
      - swap_mode
      - override outcomes
    ending_tier:
      when:
      - if: accepted_exit_7 == true
        value: early_tier_1
      - if: accepted_exit_8 == true
        value: early_tier_2
      - if: accepted_exit_9 == true
        value: early_tier_3
      - if: accepted_exit_10 == true
        value: early_tier_4
      - else: endgame
scoring:
  outcomes:
    solved: clean progress with low fallout
    incorrect: progress with hidden instability
    override: progress with explicit technical debt
redesign:
  status: implemented_first_pass
  scope: sections 3-10 rewritten into live route and debt branches; prose can now be iterated in place
  design_goal: Player choices and task outcomes must change the sequence of experienced sections, not only local flavor text.
  working_rules:
  - section_1 remains shared, then section_2 splits by boot choice
  - route choice must change at least two later sections
  - task outcomes may redirect to different follow-up sections, not only modifiers
  - allow one deliberate late merge before the final reveal
  - keep the five technical task slots, but let some slots have route or debt variants
  action_plan:
  - Keep section_1 as the common opening and split section_2 by boot choice.
  - Replace the route-neutral section_4 flow with cargo and medical variants.
  - Replace at least one late shared problem with clean and debt-heavy variants.
  - Keep early exits, but rewrite them as lane-aware stop points instead of generic checkpoints.
  - Rewrite story markdown only after the planned branch sections exist in YAML.
  slot_matrix:
    shared_prologue:
      current_sections:
      - section_1
      - section_2_standard
      - section_2_unsigned
      planned_behavior: section_1 shared, section_2 split by boot_mode
    first_split:
      current_sections:
      - section_3
      - section_4
      planned_sections:
      - section_3
      - section_4_cargo
      - section_4_medical
      branch_driver: route_choice
    route_midgame:
      current_sections:
      - section_5
      - section_6
      planned_sections:
      - section_5_cargo
      - section_5_cargo_fallout
      - section_6_cargo
      - section_5_medical
      - section_5_medical_fallout
      - section_6_medical
      branch_driver: route_choice plus problem_4_result
    shared_eva_checkpoint:
      current_sections:
      - section_7
      - section_7_exit
      planned_sections:
      - section_7
      - section_7_exit_cargo
      - section_7_exit_medical
      branch_driver: route memory with a shared EVA decision
    debt_split:
      current_sections:
      - section_8
      - section_8_exit
      planned_sections:
      - section_8_clean
      - section_8_debt
      - section_8_exit_clean
      - section_8_exit_debt
      branch_driver: debt_count and override_count
    final_approach:
      current_sections:
      - section_9
      - section_9_exit
      - section_10
      planned_sections:
      - section_9
      - section_9_exit
      - section_10_clean
      - section_10_debt
      branch_driver: prior debt state plus swap_mode
    late_merge:
      current_sections:
      - section_10_exit
      planned_sections:
      - section_10_exit
      branch_driver: all surviving paths merge here for the ORION reveal decision
  branch_map:
  - id: section_3
    status: keep_and_retarget
    role: route choice
    next_by_action:
      take_cargo_route: section_4_cargo
      take_medical_route: section_4_medical
  - id: section_4_cargo
    status: planned
    lane: cargo
    task_slot: 2
    role: cargo-side access problem with Tony and freight constraints
    next_by_outcome:
      solved: section_5_cargo
      incorrect: section_5_cargo_fallout
      override: section_5_cargo_fallout
  - id: section_4_medical
    status: planned
    lane: medical
    task_slot: 2
    role: medical-side access problem with Clara and quarantine friction
    next_by_outcome:
      solved: section_5_medical
      incorrect: section_5_medical_fallout
      override: section_5_medical_fallout
  - id: section_5_cargo
    status: planned
    lane: cargo
    role: stable cargo follow-up scene
    next: section_6_cargo
  - id: section_5_cargo_fallout
    status: planned
    lane: cargo
    role: cargo fallout scene caused by a shaky task result
    next: section_6_cargo
  - id: section_5_medical
    status: planned
    lane: medical
    role: stable medical follow-up scene
    next: section_6_medical
  - id: section_5_medical_fallout
    status: planned
    lane: medical
    role: medical fallout scene caused by a shaky task result
    next: section_6_medical
  - id: section_6_cargo
    status: planned
    lane: cargo
    task_slot: 3
    role: cargo-specific drone or handoff problem
    next: section_7
  - id: section_6_medical
    status: planned
    lane: medical
    task_slot: 3
    role: medical-specific drone or containment problem
    next: section_7
  - id: section_7
    status: keep_core_choice_rewrite_prose
    role: shared EVA decision
    next_by_action:
      team_eva: section_7_exit_{route_choice}
      solo_eva: section_7_exit_{route_choice}
  - id: section_7_exit_cargo
    status: planned
    lane: cargo
    role: first stop-or-continue checkpoint framed by cargo consequences
    next_if_continue:
      low_debt: section_8_clean
      high_debt: section_8_debt
    next_if_stop: ending_1
  - id: section_7_exit_medical
    status: planned
    lane: medical
    role: first stop-or-continue checkpoint framed by medical consequences
    next_if_continue:
      low_debt: section_8_clean
      high_debt: section_8_debt
    next_if_stop: ending_1
  - id: section_8_clean
    status: planned
    lane: debt_clean
    task_slot: 4
    role: cleaner hull repair path unlocked by disciplined earlier play
    next: section_8_exit_clean
  - id: section_8_debt
    status: planned
    lane: debt_heavy
    task_slot: 4
    role: more chaotic hull repair path shaped by overrides and unstable fixes
    next: section_8_exit_debt
  - id: section_8_exit_clean
    status: planned
    lane: debt_clean
    role: partial recovery checkpoint with a credible path forward
    next_if_continue: section_9
    next_if_stop: ending_2
  - id: section_8_exit_debt
    status: planned
    lane: debt_heavy
    role: partial recovery checkpoint where stopping means containing self-inflicted fragility
    next_if_continue: section_9
    next_if_stop: ending_2
  - id: section_9
    status: keep_choice_expand_consequences
    role: shared connector swap choice
    next: section_9_exit
  - id: section_9_exit
    status: keep_exit_expand_consequences
    role: shared stop-or-continue checkpoint with route-aware text
    next_if_continue:
      low_debt: section_10_clean
      high_debt: section_10_debt
    next_if_stop: ending_3
  - id: section_10_clean
    status: planned
    lane: debt_clean
    task_slot: 5
    role: disciplined final repair variant with a cleaner ORION breadcrumb
    next: section_10_exit
  - id: section_10_debt
    status: planned
    lane: debt_heavy
    task_slot: 5
    role: brittle final repair variant where shortcuts distort the climax
    next: section_10_exit
  - id: section_10_exit
    status: keep_as_only_late_merge
    role: shared ORION reveal gate
    next_if_stop: ending_4
    next_if_continue: ending_5
  ending_matrix:
  - ending: ending_1
    trigger: stop_after_7
    rewrite_requirement: reflect whether cargo or medical route convinced Alex to stop early
  - ending: ending_2
    trigger: stop_after_8
    rewrite_requirement: distinguish clean recovery from debt containment
  - ending: ending_3
    trigger: stop_after_9
    rewrite_requirement: reflect whether the player arrived here through cargo or medical fallout
  - ending: ending_4
    trigger: stop_after_10
    rewrite_requirement: full repair completed, but the player's route and debt history should tint the sign-off
  - ending: ending_5
    trigger: continue_after_10
    rewrite_requirement: ORION reveal remains shared, but Alex's reaction should acknowledge route history and technical debt
scenario:
  id: code_of_growth_hydroworld_v2
  title: Code of Growth - Hydroworld
  start_section: section_1
  cast:
  - id: alex
    role: automation_infrastructure_engineer
  - id: lina
    role: chief_botanist
  - id: tony
    role: cargo_dispatcher
  - id: clara
    role: medical_technician
  - id: vex
    role: support_technician
  - id: ray
    role: veteran_engineer
  - id: elena
    role: it_director
  - id: captain
    role: ship_captain
  - id: orion
    role: navigation_ai
  locations:
  - id: incubator_4
    label: 'Incubator #4, Agro-Dome'
  - id: sector_a_control
    label: Sector A Control Room
  - id: cross_ship_route
    label: Cross-Ship Service Route
  - id: access_gate
    label: Maintenance Access Gate
  - id: airlock_4
    label: 'Airlock #4'
  - id: exterior_hull
    label: Exterior Hull Surface
  - id: technical_gap
    label: Hull Technical Gap
  - id: cable_connector
    label: Main Cable Connector
  sections:
  - id: section_1
    title: 'Section 1: Boot Choice in the Grow Bay'
    location_id: incubator_4
    intro:
      narrative: 'Alex drops into a folding chair in Incubator #4. A potato vine glows inside a glass grow tube while red alarm lights pulse across the aisle. Sector A is locked after the control link fails, and the watering system is frozen. The PDA opens a local maintenance terminal. To Alex surprise, instead of the standard welcome screen he''s presented with boot menu he has not seen before. A call from Lina distracts his uncertainty.'
      dialogue:
      - speaker: lina
        text: How are things looking?
      - speaker: alex
        text: That's a strange new boot menu I'm getting...
      - speaker: lina
        text: Huh? Must be yet another half baked software update. What does it say?
      - speaker: alex
        text: Boot V9 or boot V10.0037.custom.experimental.unsigned
      - speaker: lina
        text: You're on your own with this one. Who knows what promisses unsigned gives...
    interaction:
      type: branch
      title: Console Build Decision
      prompt: Choose which console build Alex starts on the terminal to reconnect Sector A control.
      actions:
      - id: choose_standard
        text: V9 Enterprise
        description: Boot the standard console profile with the full startup checklist and logging.
        sets_flag: 'boot_mode: standard'
        next: section_2_standard
      - id: choose_unsigned
        text: V10.0037.custom.experimental.unsigned
        description: If this is a new build it probably has tons of new cool features.
        sets_flag: 'boot_mode: unsigned'
        next: section_2_unsigned
    conclusion:
      by_action:
        choose_standard:
          narrative: The PDA loads the enterprise console and opens a verified device map across the screen. Sector A shows locked while the recovery tools finish loading. Alex moved with the same enterprise confidence as the build itself, because after all, if the console boot was still progressing, there was no reason to outrun the loading.
        choose_unsigned:
          narrative: The PDA loads an unsigned experimental build. Alex is welcomed with a nice new background and soft music. During the load sequence Alex spots useless lines like "validation checks disabled" and "security checks disabled", but he doens't pay much attention to those - who reads logs before incidents anyway. With the custom tools and soft music, Alex heads to Sector A Control to start the reconnect.
  - id: section_2_standard
    title: 'Section 2 Standard: Sector A - Missing Dependencies'
    location_id: sector_a_control
    intro:
      narrative: The enterprise console takes a little longer, but it arrives with calmer telemetry and fewer visual fireworks. The comfort lasts only until the dependency panel starts blinking. Sector A still cannot close the control handshake, and the same lock remains in place.
      dialogue:
      - speaker: lina
        text: Slower boot, cleaner dashboard. Why is Sector A still dead?
      - speaker: alex
        text: One startup module from the station update is racing ahead of its dependencies.
      - speaker: lina
        text: So even the safe build inherited the same bad idea?
      - speaker: alex
        text: Yes. We still need `sector-link` to wait for the service chain before handshaking.
      - speaker: lina
        text: Then fix it once, and let's not debug this corridor again tonight.
    interaction:
      type: problem
      title: Help Alex stabilize startup order in the enterprise console
      prompt: The enterprise profile still carries one rushed startup module from the latest station-wide update. The race is less flashy, but no less real.
      modifiers:
      - condition: boot_mode == standard
        effect: Even the standard build carries one rushed startup module from the latest station-wide update.
      - condition: boot_mode == unsigned
        effect: The unsigned build skips its normal startup barrier, so the race is visible immediately.
      snippet:
      - async function bootSectorLink(services) {
      - '  services.map((service) => service.start());'
      - '  const link = await sectorLink.handshake();'
      - '  if (!link.ok) throw new Error("sector-link offline");'
      - '  return "ready";'
      - '}'
      actions:
      - id: blame_controller
        text: Blame the controller rack and restart it from the wall panel
        description: Treat the issue as external hardware trouble and reset the room.
        outcome: incorrect
        sets_flag: 'problem_2_result: incorrect'
      - id: sleep_then_retry
        text: Add a fixed delay before the handshake
        description: Wait a few seconds and hope the service chain happens to finish in time.
        outcome: incorrect
        sets_flag: 'problem_2_result: incorrect'
      - id: await_service_barrier
        text: Wait for all service startups before sector-link handshakes
        description: Hold the handshake until the dependency chain reports ready.
        outcome: solved
        sets_flag: 'problem_2_result: solved'
      - id: force_sector_link
        text: Override startup checks and force sector-link online
        description: Skip the safety barrier and bring the link up dirty but fast.
        outcome: override
        sets_flag: 'problem_2_result: override'
    conclusion:
      by_action:
        blame_controller:
          narrative: |-
            The controller room reboots, loses another minute, and comes back exactly as stubborn as before. Alex pokes the service order until the link finally answers.

            Water starts moving again, but the main valve farther down the ship is still blocked.
          next_section: section_3
        sleep_then_retry:
          narrative: |-
            The fixed delay works once and only because the ship is feeling generous. sector-link comes up, but Alex can already smell the future incident report.

            The immediate crisis softens, yet the main valve still needs hands on the next segment.
          next_section: section_3
        await_service_barrier:
          narrative: |-
            The startup order settles down, `sector-link` comes up cleanly, and the controller answers at last. The enterprise build stays stable, but only after Alex forces it to finish one conversation before starting the next.

            Sector A finally responds, but the command path still points toward the next blocked compartment. Alex grabs the PDA and moves on before the station software finds a new way to surprise him.
          next_section: section_3
        force_sector_link:
          narrative: |-
            Alex shoves sector-link past its checks and the controller answers with visible bad temper. The dashboard turns green faster than it turns trustworthy.

            Water moves again, but the ship now owes Alex one hidden failure and the main valve is still ahead.
          next_section: section_3
  - id: section_2_unsigned
    title: 'Section 2 Unsigned: Sector A - Missing Dependencies'
    location_id: sector_a_control
    intro:
      narrative: Alex barely taps the confirm key before the experimental build jumps to the desktop. The quick boot looks great for about three seconds. Then the status panel fills with yellow warnings instead of green INFOs. Most of the console is awake, but currently it looks like a traffic light with big red, medium amber and a small touch of green.
      dialogue:
      - speaker: lina
        text: That was fast. So why is Sector A still dead?
      - speaker: alex
        text: Because this build boots the interface before the background services finish sorting themselves out.
      - speaker: lina
        text: Which one do we actually need?
      - speaker: alex
        text: '`sector-link`. Without it, this nice new desktop is as good as a screensaver.'
      - speaker: lina
        text: Then fix the race, and keep the wallpaper if you must.
    interaction:
      type: problem
      title: Help Alex turn the experimental terminal into something useful
      prompt: The experimental build is lightning fast because is starts services in parallel. Since it's difficult to get good concurrency experts in deep space, issues are unavoidable.
      modifiers:
      - condition: boot_mode == standard
        effect: Even the standard build carries one rushed startup module from the latest station-wide update.
      - condition: boot_mode == unsigned
        effect: The unsigned build skips its normal startup barrier, so the race is visible immediately.
      snippet:
      - async function bootSectorLink(services) {
      - '  services.map((service) => service.start());'
      - '  const link = await sectorLink.handshake();'
      - '  if (!link.ok) throw new Error("sector-link offline");'
      - '  return "ready";'
      - '}'
      actions:
      - id: blame_controller
        text: Blame the controller rack and restart it from the wall panel
        description: Treat the issue as external hardware trouble and reset the room.
        outcome: incorrect
        sets_flag: 'problem_2_result: incorrect'
      - id: sleep_then_retry
        text: Add a fixed delay before the handshake
        description: Wait a few seconds and hope the service chain happens to finish in time.
        outcome: incorrect
        sets_flag: 'problem_2_result: incorrect'
      - id: await_service_barrier
        text: Wait for all service startups before sector-link handshakes
        description: Hold the handshake until the dependency chain reports ready.
        outcome: solved
        sets_flag: 'problem_2_result: solved'
      - id: force_sector_link
        text: Override startup checks and force sector-link online
        description: Skip the safety barrier and bring the link up dirty but fast.
        outcome: override
        sets_flag: 'problem_2_result: override'
    conclusion:
      by_action:
        blame_controller:
          narrative: |-
            The controller room reboots, loses another minute, and comes back exactly as stubborn as before. Alex pokes the service order until the link finally answers.

            Water starts moving again, but the main valve farther down the ship is still blocked.
          next_section: section_3
        sleep_then_retry:
          narrative: |-
            The fixed delay works once and only because the ship is feeling generous. sector-link comes up, but Alex can already smell the future incident report.

            The immediate crisis softens, yet the main valve still needs hands on the next segment.
          next_section: section_3
        await_service_barrier:
          narrative: |-
            The startup order settles down, `sector-link` comes up cleanly, and the controller answers at last. The fast build keeps its speed, but only after Alex forces it to finish one conversation before starting the next.

            Sector A finally responds, but the command path still points toward the next blocked compartment. Alex grabs the PDA and moves on before the experimental build finds a new way to surprise him.
          next_section: section_3
        force_sector_link:
          narrative: |-
            Alex shoves sector-link past its checks and the controller answers with visible bad temper. The dashboard turns green faster than it turns trustworthy.

            Water moves again, but the ship now owes Alex one hidden failure and the main valve is still ahead.
          next_section: section_3
  - id: section_3
    title: 'Section 3: Crossing the Ship'
    location_id: cross_ship_route
    intro:
      narrative: 'The terminal is finally holding a live connection to Sector A when a new alert climbs over the recovery logs. Water is not stuck here anymore. The line is blocked farther down the ship at Maintenance Access Gate before Airlock #4, where the supply path narrows into the outer service corridor. Alex looks up from the screen and finds himself standing between two doors: the heavier cargo hatch on the left and the cleaner medical passage on the right. '
      dialogue:
      - speaker: lina
        text: The software side is breathing again. Now go move the part that refuses to move.
      - speaker: alex
        text: It's like you imply that I have to do something physically?!
      - speaker: lina
        text: Only eventually. For now you need to get there first.
      - speaker: alex
        text: Cargo is slower and cleaner. Medical is shorter and stranger.
      - speaker: lina
        text: Everything on this ship is shorter and stranger.
    interaction:
      type: branch
      title: Bandages or cargo containers?
      prompt: 'Guide Alex towards Airlock #4'
      actions:
      - id: take_cargo_route
        text: Alex will see his luck through the Cargo management compartment
        description: Pass through freight operations and lean on Tony for access.
        sets_flag: 'route_choice: cargo'
        next: section_4_cargo
      - id: take_medical_route
        text: None has been sick lately so route through Medical looks like a safer bet
        description: Cut through the food block and let Clara solve the human paperwork.
        sets_flag: 'route_choice: medical'
        next: section_4_medical
    conclusion:
      by_action:
        take_cargo_route:
          narrative: |-
            Alex cuts through freight corridors where everything smells like dust, metal, and accounting.

            Tony is already waiting by the freight checkpoint with a pass that should have worked the first time.
        take_medical_route:
          narrative: |-
            Alex cuts through steam, vending noise, and medical scanners that look too awake for this hour.

            Clara gets Alex to the quarantine side gate, where the paperwork is failing in a more creative way.
  - id: section_4_cargo
    title: 'Section 4 Cargo: Freight Gate Permission Check'
    location_id: access_gate
    intro:
      narrative: Tony meets Alex at the freight checkpoint with a handheld scanner and the expression of a man who expected a simpler night. The cargo-side maintenance gate can see the emergency tag, the route authorization, and Tony's temporary pass. It still refuses to open.
      dialogue:
      - speaker: tony
        text: I filed the freight pass ten minutes ago. The gate is being dramatic.
      - speaker: alex
        text: No, the gate is being written in Java.
      - speaker: tony
        text: Is that better or worse than dramatic?
      - speaker: alex
        text: Usually slower.
    interaction:
      type: problem
      title: 'Problem 2 Cargo: Freight Pass Comparison'
      prompt: The freight gate reads the temporary access level, but compares the string by reference instead of content. Tony's valid cargo-side maintenance pass keeps getting rejected.
      modifiers:
      - condition: boot_mode == unsigned
        effect: The unsigned console build keeps repainting the scanner UI, which makes every test run feel less trustworthy.
      snippet:
      - boolean gateAllows(Credential credential) {
      - '    String level = credential.getAccessLevel();'
      - '    if (level == "MAINT_RED") {'
      - '        return true;'
      - '    }'
      - '    return credential.hasSupervisorEscort();'
      - '}'
      actions:
      - id: restart_gate
        text: Reboot the freight gate and hope the cache clears
        description: Treat the lockout like a stale controller state.
        outcome: incorrect
        sets_flag: 'problem_4_result: incorrect'
      - id: hardcode_allow
        text: Hardcode the gate to trust every cargo maintenance badge
        description: Open the door by flattening the permission check for everyone.
        outcome: incorrect
        sets_flag: 'problem_4_result: incorrect'
      - id: compare_access_value
        text: Compare the access level by value instead of by reference
        description: Use proper string content comparison so valid temporary clearance is recognized.
        outcome: solved
        sets_flag: 'problem_4_result: solved'
      - id: jumper_the_lock
        text: Override the lock through the freight panel bridge
        description: Open the gate physically and let Security discover it later.
        outcome: override
        sets_flag: 'problem_4_result: override'
    conclusion:
      by_action:
        restart_gate:
          narrative: |-
            The reboot wastes time and proves that the gate remembers its bad decisions perfectly. Alex fixes the comparison under Tony's increasingly educational silence.

            The freight corridor opens, but everyone in it now knows Alex needed a second argument with a door.
          next_section: section_5_cargo_fallout
        hardcode_allow:
          narrative: |-
            The door opens for Alex and, briefly, for the entire idea of bad governance. Tony watches Alex delete the worst of the patch and decides not to ask for details.

            Cargo access is clear, but the audit trail now looks like a future apology written in haste.
          next_section: section_5_cargo_fallout
        compare_access_value:
          narrative: |-
            The scanner stops lying as soon as the code starts comparing what it actually read. Tony gives the gate a look usually reserved for delayed shipments.

            The freight lane stays orderly all the way to Airlock
          next_section: section_5_cargo
        jumper_the_lock:
          narrative: |-
            Alex bridges the freight lock, the door jerks open, and three compliance policies quietly die inside the wall.

            The path is open, but the override smell follows Alex toward the airlock like a second tether.
          next_section: section_5_cargo_fallout
  - id: section_5_cargo
