title: Result Too Early
prompt: This code reads the scanner result before the background task is done. What is wrong with this code sample?
snippet:
- void loadScanner() {
- '  Future<Status> future = pool.submit(this::bootScanner);'
- '  if (future.getNow(Status.FAIL).ok()) {'
- '    kiosk.showReady();'
- '  }'
- '}'
