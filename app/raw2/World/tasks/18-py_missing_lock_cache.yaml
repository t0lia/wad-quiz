language: python
bug_class: shared cache changed without lock
mechanic_type: debug_decision
slot_theme_fit: booth startup work under queue pressure
prompt_surface: three-option booth debug challenge
answer_shape: action_id
title: Cache With No Lock
prompt: This code changes a shared scanner cache from many threads. What is wrong with this code sample?
snippet:
- 'def cache_result(shared, key, value):'
- '    if key not in shared:'
- '        shared[key] = value'
