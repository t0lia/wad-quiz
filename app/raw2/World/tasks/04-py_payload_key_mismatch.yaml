id: py_payload_key_mismatch
pool: badge_data_traps
language: python
bug_class: payload key mismatch
mechanic_type: debug_decision
slot_theme_fit: stock booking from booth payloads
prompt_surface: three-option booth debug challenge
answer_shape: action_id
title: Wrong Payload Key
prompt: This reservation code fails even though the incoming payload includes the sock id. What is wrong with this code sample?
snippet:
- 'def reserve(payload):'
- '    # payload example: {"sock_id": "db-legend-01"}'
- '    sock_id = payload["sockId"]'
- '    return inventory[sock_id]'
actions:
- id: key_name_does_not_match_payload
  text: The code reads sockId, but the payload uses sock_id, so the key is wrong
  description: The payload uses snake_case, but the code expects camelCase.
  flag_modifications:
  - flag: completed_tasks
    operation: add
    value: 1
  - flag: solved_count
    operation: add
    value: 1
  outcome: solved
  scores:
    technical_skills: 1.0
- id: inventory_should_be_list
  text: The stock container should be a list because dictionary lookups are too strict
  description: The problem is not the container type. The field name is wrong.
  flag_modifications:
  - flag: completed_tasks
    operation: add
    value: 1
  - flag: incorrect_count
    operation: add
    value: 1
  outcome: incorrect
  scores:
    technical_skills: 0.0
- id: return_copy_of_stock
  text: The function should return a copy of the stock item
  description: Returning a copy does not fix the wrong key lookup.
  flag_modifications:
  - flag: completed_tasks
    operation: add
    value: 1
  - flag: incorrect_count
    operation: add
    value: 1
  outcome: incorrect
  scores:
