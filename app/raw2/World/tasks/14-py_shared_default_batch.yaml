bug_class: mutable default argument reused across calls
mechanic_type: debug_decision
slot_theme_fit: booth startup work under queue pressure
prompt_surface: three-option booth debug challenge
answer_shape: action_id
title: Shared Retry List
prompt: This code keeps old scanner ids between calls. What is wrong with this code sample?
snippet:
- 'def collect_failed(scanner_id, failed=[]):'
- '    failed.append(scanner_id)'
- '    return failed'
actions:
