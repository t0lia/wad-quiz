format: StageConfigsV1
source_world: socks
stages:
- id: intro
  stage_type: choice
  title: DB Booth, 10:03 AM
  image: intro_booth.webp
  location_id: conference_hall
  intro_narrative: 'Lucas came to WeAreDevelopers Congress for one reason: the DB booth has two rare socks he wants. A lot of people have already taken the challenge, and the people around him wear the same look of hope, stress, and defeat. Three debugging questions are waiting on the tablet. Lucas feels strangely lucky as he steps forward.'
  choice_id: intro
- id: task_1
  stage_type: task
  title: Queue Freeze
  image: intro_booth.webp
  location_id: booth_tablet_1
  intro_narrative: The first booth tablet freezes when the challenge app starts the demo. The line behind Lucas gets very quiet.
  task_pool_id: booth_queue_faults
  task_pool_title: Booth queue bugs under pressure
  task_stage_conclusion:
    incorrect: Lucas still has 0 socks. After all, in summer it's not that critical.
    solved: Lucas now has 1 sock. At least his left leg will feel warm in winter.
    override: Lucas still has 0 socks. The booth does not accept force as a smart plan.
- id: task_2_hot_streak
  stage_type: task
  title: Nice Start, Try Again
  image: one_sock.webp
  location_id: booth_tablet_2
  intro_narrative: The booth app unlocks the second challenge. Lucas is now one good answer away from looking very serious about socks.
  task_pool_id: badge_data_traps
  task_pool_title: Badge and stock data bugs
  task_stage_conclusion:
    incorrect: Lucas still has 1 sock. The second sock stays out of reach, like a bug that passes on your machine.
    solved: Lucas now has 2 socks. Even the booth screen looks less cold now.
    override: Lucas still has 1 sock. The score moves on, but not in a proud way.
- id: task_2_recovery
  stage_type: task
  title: Back on the Board
  image: intro_booth.webp
  location_id: booth_tablet_2
  intro_narrative: The second challenge is Lucas's chance to recover. The line behind him would love this to end fast.
  task_pool_id: badge_data_traps
  task_pool_title: Badge and stock data bugs
  task_stage_conclusion:
    incorrect: Lucas still has 0 socks. This comeback is missing the comeback part.
    solved: Lucas now has 1 sock. The booth must now respect the hobby a little.
    override: Lucas still has 0 socks. The fix works like a demo-day hotfix.
- id: task_3_perfect
  stage_type: task
  title: Match Point
  image: two_socks.webp
  location_id: prize_table
  intro_narrative: Lucas reaches the last question with no mistakes. The final screen loads like it does not expect him to be here.
  task_pool_id: finale_checkout_failures
  task_pool_title: Final prize desk bugs
  task_stage_conclusion:
    incorrect: Lucas stays at 2 socks. The perfect run ends here, which is bold for one small question.
    solved: Lucas keeps all 2 socks. The booth hands them over like it lost an argument.
    override: Lucas stays at 2 socks. The result counts, but the method looks suspicious.
- id: task_3_split_from_hot
  stage_type: task
  title: One More for the Pair
  image: one_sock.webp
  location_id: prize_table
  intro_narrative: Lucas has one right answer and one wrong answer. The last question will decide if he gets the full pair.
  task_pool_id: finale_checkout_failures
  task_pool_title: Final prize desk bugs
  task_stage_conclusion:
    incorrect: Lucas stays at 1 sock. The second sock is still just a nice idea.
    solved: Lucas now has 2 socks. The booth staff looks a bit worried now.
    override: Lucas stays at 1 sock. Progress happened, but nobody wants to write it down.
- id: task_3_split_from_recovery
  stage_type: task
  title: Recovery Lap
  image: one_sock.webp
  location_id: prize_table
  intro_narrative: Lucas has pulled the run back to a decent level. One last answer can still save the day.
  task_pool_id: finale_checkout_failures
  task_pool_title: Final prize desk bugs
  task_stage_conclusion:
    incorrect: Lucas stays at 1 sock. The comeback ends here, which feels very on-brand for debugging.
    solved: Lucas keeps 1 sock. It is not the full pair, but it is still better than a sticker.
    override: Lucas stays at 1 sock. He survives, but style is another question.
- id: task_3_last_chance
  stage_type: task
  title: Save the Tote Bag
  image: intro_booth.webp
  location_id: prize_table
  intro_narrative: Lucas has one last question to avoid total failure. The tablet shows the final try without much hope.
  task_pool_id: finale_checkout_failures
  task_pool_title: Final prize desk bugs
  task_stage_conclusion:
    incorrect: Lucas still has 0 socks. Even the tote bag looks too pleased.
    solved: Lucas now has 1 sock. Late success is still success.
    override: Lucas still has 0 socks. The effort was brave, which is a polite way to say weak.
- id: ending_111
  stage_type: conclusion
  title: Three Socks, No Explanation
  image: three_socks.webp
  text: The booth screen confirms the win, and a staff member gives Lucas the two rare socks in a clear sleeve. Then the app blinks, prints a bonus ticket, and someone adds a third sock for no clear reason. Lucas laughs, the line laughs, and nobody at the booth can explain why there are now three.
- id: ending_110
  stage_type: conclusion
  title: Two Socks, One Dramatic Pause
  image: two_socks.webp
  text: Lucas makes one mistake but still leaves with the rare pair. The line claps like people who are happy it was not their turn.
- id: ending_101
  stage_type: conclusion
  title: Mythic Pair by Split Decision
  image: two_socks.webp
  text: Lucas looks uneven on paper but still wins the rare socks. The booth calls it fair, which feels generous.
- id: ending_100
  stage_type: conclusion
  title: Premium Runner-Up
  image: one_sock.webp
  text: Lucas starts well but slows down at the end. He leaves with a good prize pack, a tote bag, and two stickers.
- id: ending_011
  stage_type: conclusion
  title: Comeback Collector
  image: one_sock.webp
  text: Lucas turns a bad start into a solid finish and wins one rare sock. The booth calls it growth, which is not kind but not wrong.
- id: ending_010
  stage_type: conclusion
  title: One Sock, Many Lessons
  image: one_sock.webp
  text: Lucas solves one problem and avoids full disaster. He gets one rare sock and a careful nod from the booth.
- id: ending_001
  stage_type: conclusion
  title: Late Surge, Limited Loot
  image: one_sock.webp
  text: Lucas saves the run in the last round and gets a small prize. The booth screen calls it clutch, which sounds better than almost out.
- id: ending_000
  stage_type: conclusion
  title: Tote Bag Ending
  image: intro_booth.webp
  text: Lucas misses the full challenge and gets a normal tote bag and stickers. He also learns that rare socks are protected by real bugs.
- id: final_choice
  stage_type: choice
  title: The Show
  image: intro_booth.webp
  location_id: conference_hall
  intro_narrative: |
    The DB Booth crew asks Lucas to step in front of a small camera. A host with a headset and a too-bright smile starts the interview.

    Host: "So — three questions, three debug challenges, and now you are holding rare socks in a congress full of engineers. How does that feel?"

    Lucas: *smiles carefully* "Honestly? Like passing a code review I did not expect to pass."

    Host: "Final question, and this is the real one. What will you do with the socks?"
  choice_id: final_choice
- id: the_end
  stage_type: conclusion
  title: The End
  image: intro_booth.webp
  text: The booth lights dim, the host wraps the segment, and Lucas walks back into the crowd with his socks, his story, and a small sticker that says "DB Booth MVP".
