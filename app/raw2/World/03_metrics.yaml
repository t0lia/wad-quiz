axes:
  technical_skills: how well Lucas finds the real bug before the booth app and the queue lose patience.

categories:
  sapphire:
    label: Exceptional
    meaning: Lucas understands the room, the code, and the prize table very fast.
  teal:
    label: Strong
    meaning: Lucas looks very ready and solves problems well.
  green:
    label: Sound
    meaning: Lucas gets good results with only a little chaos.
  amber:
    label: Mixed
    meaning: Lucas learns fast, but the socks are not fully impressed.
  slate:
    label: Limited
    meaning: The booth staff now knows Lucas mainly as a warning story.

archetypes:
  - when:
      technical_skills: ">= 3.0"
    archetype: Sock Oracle
    category: sapphire
    reading: Lucas finds every bug, wins both rare socks, and leaves the booth looking far too calm.
  - when:
      technical_skills: ">= 2.0"
    archetype: Booth Closer
    category: teal
    reading: Lucas solves most of the challenge, earns respect, and leaves with a story he will tell all day.
  - when:
      technical_skills: ">= 1.0"
    archetype: Curious Collector
    category: green
    reading: Lucas gets one good fix, learns the rest the hard way, and still leaves with pride.
  - when:
      default: true
    archetype: Lanyard Wanderer
    category: amber
    reading: Lucas leaves with new respect for booth puzzles, one normal tote bag, and no rare socks.
