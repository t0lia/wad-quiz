format: StageNavigationV1
source_world: socks
start_stage: intro
stages:
- id: intro
  next_by_action:
    start_hunt: task_1
- id: task_1
  next_by_outcome:
    incorrect: task_2_recovery
    solved: task_2_hot_streak
    override: task_2_recovery
- id: task_2_hot_streak
  next_by_outcome:
    incorrect: task_3_split_from_hot
    solved: task_3_perfect
    override: task_3_split_from_hot
- id: task_2_recovery
  next_by_outcome:
    incorrect: task_3_last_chance
    solved: task_3_split_from_recovery
    override: task_3_last_chance
- id: task_3_perfect
  next_by_outcome:
    incorrect: ending_110
    solved: ending_111
    override: ending_110
- id: task_3_split_from_hot
  next_by_outcome:
    incorrect: ending_100
    solved: ending_101
    override: ending_100
- id: task_3_split_from_recovery
  next_by_outcome:
    incorrect: ending_010
    solved: ending_011
    override: ending_010
- id: task_3_last_chance
  next_by_outcome:
    incorrect: ending_000
    solved: ending_001
    override: ending_000
terminal_stages:
- ending_111
- ending_110
- ending_101
- ending_100
- ending_011
- ending_010
- ending_001
- ending_000
