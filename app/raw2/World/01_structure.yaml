format: StageNavigationV1
source_world: socks
start_stage: intro
stages:
- id: intro
  next_by_action:
    start_hunt: task_1
- id: task_1
  next_by_outcome:
    incorrect: task_2_recovery
    solved: task_2_hot_streak
    override: task_2_recovery
- id: task_2_hot_streak
  next_by_outcome:
    incorrect: task_3_split_from_hot
    solved: task_3_perfect
    override: task_3_split_from_hot
- id: task_2_recovery
  next_by_outcome:
    incorrect: task_3_last_chance
    solved: task_3_split_from_recovery
    override: task_3_last_chance
- id: task_3_perfect
  next_by_outcome:
    incorrect: final_choice
    solved: final_choice
    override: final_choice
- id: task_3_split_from_hot
  next_by_outcome:
    incorrect: final_choice
    solved: final_choice
    override: final_choice
- id: task_3_split_from_recovery
  next_by_outcome:
    incorrect: final_choice
    solved: final_choice
    override: final_choice
- id: task_3_last_chance
  next_by_outcome:
    incorrect: final_choice
    solved: final_choice
    override: final_choice
- id: final_choice
  next_by_action:
    keep: the_end
    sell: the_end
terminal_stages:
- the_end
